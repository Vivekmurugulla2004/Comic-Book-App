<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ComicArc{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='fonts/fonts.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="navbar">
    <a href="/" class="nav-brand">
      <span class="brand-icon">◈</span>
      ComicArc
    </a>
    <div class="nav-links">
      <a href="/" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">Library</a>
      <a href="/runs" class="nav-link {% if request.endpoint in ['runs','run_detail','new_run','edit_run'] %}active{% endif %}">Runs</a>
      <a href="/stats" class="nav-link {% if request.endpoint == 'stats' %}active{% endif %}">Stats</a>
      <a href="/settings" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">Settings</a>
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="app-footer">
    ComicArc v1.0.0 — personal use only. Only import files you have the legal right to possess.
    <a href="https://github.com/Vivekmurugulla2004/ComicArc/blob/main/LEGAL.md" target="_blank" rel="noopener">Legal &amp; Content Policy</a>
  </footer>

  {% block scripts %}{% endblock %}
  <script>
    // Fade-in all images once loaded
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('img').forEach(img => {
        if (img.complete) img.classList.add('loaded');
        else img.addEventListener('load', () => img.classList.add('loaded'));
      });
    });
  </script>
</body>
</html>
